<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Planner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }

  header { background: #fff; border-bottom: 1px solid #e0dfd8; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 20px; font-weight: 500; }
  .subtitle { font-size: 13px; color: #888; margin-top: 2px; }

  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px; }

  .add-card { background: #fff; border: 1px solid #e0dfd8; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
  .add-card h2 { font-size: 15px; font-weight: 500; margin-bottom: 14px; }
  .add-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .add-row input[type="text"] { flex: 1; min-width: 180px; padding: 9px 12px; border: 1px solid #d0cfc8; border-radius: 8px; font-size: 14px; background: #fafaf8; outline: none; }
  .add-row input[type="text"]:focus { border-color: #378ADD; background: #fff; }
  .season-checks { display: flex; gap: 8px; flex-wrap: wrap; }
  .season-checks label { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; padding: 7px 12px; border: 1px solid #d0cfc8; border-radius: 999px; background: #fafaf8; user-select: none; transition: all .15s; }
  .season-checks input[type="checkbox"] { display: none; }
  .season-checks label.checked-Summer { background: #FAECE7; border-color: #D85A30; color: #993C1D; }
  .season-checks label.checked-Fall   { background: #FAEEDA; border-color: #BA7517; color: #633806; }
  .season-checks label.checked-Winter { background: #EEEDFE; border-color: #7F77DD; color: #3C3489; }
  .season-checks label.checked-Spring { background: #EAF3DE; border-color: #639922; color: #27500A; }
  .btn-add { padding: 9px 20px; background: #1a1a18; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .btn-add:hover { background: #333; }
  .btn-add:disabled { background: #aaa; cursor: not-allowed; }

  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .filter-btn { padding: 6px 14px; border-radius: 999px; border: 1px solid #d0cfc8; background: #fff; color: #555; font-size: 13px; cursor: pointer; transition: all .15s; }
  .filter-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .search-wrap { margin-left: auto; }
  .search-wrap input { padding: 6px 12px; border: 1px solid #d0cfc8; border-radius: 8px; font-size: 13px; background: #fff; outline: none; width: 180px; }
  .search-wrap input:focus { border-color: #378ADD; }

  .meal-grid { display: flex; flex-direction: column; gap: 4px; }
  .meal-row { display: grid; grid-template-columns: 32px 1fr auto auto; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; background: #fff; border: 1px solid #e8e7e0; transition: border-color .15s; }
  .meal-row:hover { border-color: #c0bfb8; }
  .rank { font-size: 12px; color: #aaa; text-align: right; }
  .meal-info .name { font-size: 14px; font-weight: 500; }
  .meal-info .seasons { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
  .badge-Summer { background: #FAECE7; color: #993C1D; }
  .badge-Fall   { background: #FAEEDA; color: #633806; }
  .badge-Winter { background: #EEEDFE; color: #3C3489; }
  .badge-Spring { background: #EAF3DE; color: #27500A; }
  .count-area { display: flex; align-items: center; gap: 6px; }
  .count-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #d0cfc8; background: #fafaf8; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; line-height: 1; color: #555; }
  .count-btn:hover { background: #f0efe8; border-color: #aaa; }
  .count-num { font-size: 14px; font-weight: 500; min-width: 28px; text-align: center; }
  .btn-delete { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #f0cfc8; background: #fff; cursor: pointer; color: #c04040; font-size: 16px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; }
  .meal-row:hover .btn-delete { opacity: 1; }

  .empty { text-align: center; padding: 48px 16px; color: #888; font-size: 14px; }
  .status { font-size: 12px; color: #888; padding: 8px 0; text-align: center; }
  .status.error { color: #c04040; }

  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.6); align-items: center; justify-content: center; font-size: 14px; color: #555; z-index: 100; }
  .loading-overlay.show { display: flex; }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">Loading meals…</div>

<header>
  <div>
    <h1>🍽 Meal Planner</h1>
    <div class="subtitle" id="meal-count">Loading…</div>
  </div>
</header>

<div class="container">

  <div class="add-card">
    <h2>Add a meal</h2>
    <div class="add-row">
      <input type="text" id="new-name" placeholder="Meal name…" autocomplete="off" />
      <div class="season-checks" id="season-checks">
        <label id="lbl-Summer"><input type="checkbox" value="Summer"> ☀️ Summer</label>
        <label id="lbl-Fall"><input type="checkbox" value="Fall"> 🍂 Fall</label>
        <label id="lbl-Winter"><input type="checkbox" value="Winter"> ❄️ Winter</label>
        <label id="lbl-Spring"><input type="checkbox" value="Spring"> 🌱 Spring</label>
      </div>
      <button class="btn-add" id="btn-add" onclick="addMeal()">Add</button>
    </div>
  </div>

  <div class="controls">
    <button class="filter-btn active" data-season="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-season="Summer" onclick="setFilter('Summer', this)">☀️ Summer</button>
    <button class="filter-btn" data-season="Fall" onclick="setFilter('Fall', this)">🍂 Fall</button>
    <button class="filter-btn" data-season="Winter" onclick="setFilter('Winter', this)">❄️ Winter</button>
    <button class="filter-btn" data-season="Spring" onclick="setFilter('Spring', this)">🌱 Spring</button>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search meals…" oninput="renderList()" />
    </div>
  </div>

  <div class="meal-grid" id="meal-grid"></div>
  <div class="status" id="status"></div>

</div>

<script>
const SUPABASE_URL = 'https://ylcthybtssnthhesbydt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlsY3RoeWJ0c3NudGhoZXNieWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTgzNjQsImV4cCI6MjA5NjQzNDM2NH0.PB1Geq9B7yjqFNNWnlkPOn3CFqHzwOBU9MdZMQsKibE';

const headers = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY
};

let meals = [];
let currentFilter = 'all';

async function api(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: { ...headers, 'Prefer': method === 'POST' ? 'return=representation' : 'return=representation' },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadMeals() {
  document.getElementById('loader').classList.add('show');
  try {
    meals = await api('GET', 'meals?select=*&order=count.desc,name.asc');
    renderList();
  } catch(e) {
    setStatus('Error loading meals: ' + e.message, true);
  }
  document.getElementById('loader').classList.remove('show');
}

function renderList() {
  const grid = document.getElementById('meal-grid');
  const search = document.getElementById('search').value.toLowerCase().trim();

  let filtered = meals.filter(m => {
    const matchSearch = !search || m.name.toLowerCase().includes(search);
    const matchSeason = currentFilter === 'all' || (m.season && m.season.includes(currentFilter));
    return matchSearch && matchSeason;
  });

  document.getElementById('meal-count').textContent = meals.length + ' meals tracked';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No meals found. Add one above!</div>';
    return;
  }

  grid.innerHTML = filtered.map((m, i) => {
    const seasons = (m.season || []).map(s =>
      `<span class="badge badge-${s}">${s}</span>`
    ).join('');
    return `<div class="meal-row" id="row-${m.id}">
      <span class="rank">${i + 1}</span>
      <div class="meal-info">
        <div class="name">${escHtml(m.name)}</div>
        ${seasons ? `<div class="seasons">${seasons}</div>` : ''}
      </div>
      <div class="count-area">
        <button class="count-btn" onclick="adjustCount('${m.id}', -1)" title="Used less">−</button>
        <span class="count-num">${m.count}</span>
        <button class="count-btn" onclick="adjustCount('${m.id}', 1)" title="Made it again">+</button>
      </div>
      <button class="btn-delete" onclick="deleteMeal('${m.id}')" title="Delete">✕</button>
    </div>`;
  }).join('');
}

async function addMeal() {
  const nameEl = document.getElementById('new-name');
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }

  const checked = [...document.querySelectorAll('#season-checks input:checked')].map(el => el.value);

  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  btn.textContent = 'Adding…';

  try {
    const existing = meals.find(m => m.name.toLowerCase() === name.toLowerCase());
    if (existing) {
      setStatus(`"${name}" already exists — use the + button to increment its count.`, false);
      btn.disabled = false; btn.textContent = 'Add'; return;
    }
    const result = await api('POST', 'meals', { name, season: checked, count: 1 });
    meals.unshift(result[0]);
    meals.sort((a,b) => b.count - a.count || a.name.localeCompare(b.name));
    nameEl.value = '';
    document.querySelectorAll('#season-checks input').forEach(el => {
      el.checked = false;
      el.closest('label').className = '';
    });
    renderList();
    setStatus(`"${name}" added!`, false);
  } catch(e) {
    setStatus('Error adding meal: ' + e.message, true);
  }
  btn.disabled = false; btn.textContent = 'Add';
}

async function adjustCount(id, delta) {
  const meal = meals.find(m => m.id === id);
  if (!meal) return;
  const newCount = Math.max(0, meal.count + delta);
  try {
    await api('PATCH', `meals?id=eq.${id}`, { count: newCount });
    meal.count = newCount;
    meals.sort((a,b) => b.count - a.count || a.name.localeCompare(b.name));
    renderList();
  } catch(e) {
    setStatus('Error updating: ' + e.message, true);
  }
}

async function deleteMeal(id) {
  const meal = meals.find(m => m.id === id);
  if (!meal) return;
  if (!confirm(`Delete "${meal.name}"?`)) return;
  try {
    await api('DELETE', `meals?id=eq.${id}`);
    meals = meals.filter(m => m.id !== id);
    renderList();
  } catch(e) {
    setStatus('Error deleting: ' + e.message, true);
  }
}

function setFilter(season, btn) {
  currentFilter = season;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
  if (!isError) setTimeout(() => { el.textContent = ''; }, 3000);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Season checkbox styling
document.querySelectorAll('#season-checks input').forEach(cb => {
  cb.addEventListener('change', () => {
    cb.closest('label').className = cb.checked ? 'checked-' + cb.value : '';
  });
});

// Enter key to add
document.getElementById('new-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') addMeal();
});

loadMeals();
</script>
</body>
</html>
