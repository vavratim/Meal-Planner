<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }

header { background: #fff; border-bottom: 1px solid #e0dfd8; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
header h1 { font-size: 19px; font-weight: 500; }
.subtitle { font-size: 12px; color: #999; margin-top: 2px; }

.btn { padding: 7px 14px; border-radius: 8px; border: 1px solid #d0cfc8; background: #fff; font-size: 13px; cursor: pointer; color: #333; white-space: nowrap; transition: background .15s; }
.btn:hover { background: #f0efe8; }
.btn-primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.btn-primary:hover { background: #333; }

.menu-wrap { position: relative; }
.dropdown { position: absolute; right: 0; top: calc(100% + 6px); background: #fff; border: 1px solid #e0dfd8; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.1); min-width: 220px; z-index: 100; overflow: hidden; }
.dropdown.hidden { display: none; }
.dropdown-item { padding: 11px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #333; border-bottom: 1px solid #f0efe8; }
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: #f5f4f0; }
.di-icon { font-size: 16px; width: 20px; text-align: center; }
.di-label { flex: 1; }
.di-toggle { width: 36px; height: 20px; background: #ccc; border-radius: 999px; position: relative; transition: background .2s; flex-shrink: 0; }
.di-toggle.on { background: #1a1a18; }
.di-toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: left .2s; }
.di-toggle.on::after { left: 18px; }
.dropdown-section { padding: 8px 16px 4px; font-size: 11px; font-weight: 500; color: #aaa; text-transform: uppercase; letter-spacing: .06em; }

.container { max-width: 860px; margin: 0 auto; padding: 20px 16px; }

.add-card { background: #fff; border: 1px solid #e0dfd8; border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; }
.add-card h2 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: #555; }
.add-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
.add-row input[type="text"] { flex: 1; min-width: 160px; padding: 8px 12px; border: 1px solid #d0cfc8; border-radius: 8px; font-size: 14px; background: #fafaf8; outline: none; }
.add-row input[type="text"]:focus { border-color: #378ADD; background: #fff; }
.tag-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
.tag-pill { font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 1px solid #d0cfc8; background: #fafaf8; cursor: pointer; user-select: none; transition: all .15s; color: #555; }
.tag-pill.selected { background: #1a1a18; border-color: #1a1a18; color: #fff; }

.controls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
.filter-btn { padding: 5px 13px; border-radius: 999px; border: 1px solid #d0cfc8; background: #fff; color: #555; font-size: 13px; cursor: pointer; transition: all .15s; }
.filter-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.search-wrap { margin-left: auto; }
.search-wrap input { padding: 6px 12px; border: 1px solid #d0cfc8; border-radius: 8px; font-size: 13px; background: #fff; outline: none; width: 180px; }
.search-wrap input:focus { border-color: #378ADD; }

.meal-grid { display: flex; flex-direction: column; gap: 4px; }
.meal-row { background: #fff; border: 1px solid #e8e7e0; border-radius: 10px; overflow: hidden; transition: border-color .15s; }
.meal-row:hover { border-color: #c0bfb8; }
.meal-main { display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 10px; padding: 10px 12px; }
.rank { font-size: 12px; color: #bbb; text-align: right; }
.meal-info { min-width: 0; }
.meal-name { font-size: 14px; font-weight: 500; }
.meal-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #f0efe8; color: #555; }

.meal-actions { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.count-area { display: flex; align-items: center; gap: 4px; }
.count-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #d0cfc8; background: #fafaf8; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: #555; }
.count-btn:hover { background: #f0efe8; }
.count-num { font-size: 13px; font-weight: 500; min-width: 26px; text-align: center; }
.btn-edit { padding: 4px 10px; font-size: 12px; border-radius: 6px; border: 1px solid #d0cfc8; background: transparent; cursor: pointer; color: #666; }
.btn-edit:hover { background: #f0efe8; }
.btn-edit.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.btn-del { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #f0cfc8; background: transparent; cursor: pointer; color: #c04040; font-size: 14px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; }
.meal-row:hover .btn-del { opacity: 1; }

.meal-editor { border-top: 1px solid #f0efe8; padding: 12px 14px 14px; background: #fafaf9; display: none; }
.meal-editor.open { display: block; }
.editor-label { font-size: 11px; font-weight: 500; color: #aaa; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.editor-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.editor-tag { font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 1px solid #d0cfc8; background: #fff; cursor: pointer; color: #555; transition: all .15s; }
.editor-tag.on { background: #1a1a18; border-color: #1a1a18; color: #fff; }
.editor-add-row { display: flex; gap: 6px; margin-top: 4px; }
.editor-add-row input { padding: 5px 10px; border: 1px solid #d0cfc8; border-radius: 6px; font-size: 13px; background: #fff; outline: none; width: 160px; }
.editor-add-row input:focus { border-color: #378ADD; }
.editor-add-row button { padding: 5px 12px; border-radius: 6px; border: 1px solid #d0cfc8; background: #fff; font-size: 13px; cursor: pointer; }
.editor-add-row button:hover { background: #f0efe8; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 50; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 14px; padding: 24px; width: 400px; max-width: 95vw; max-height: 80vh; display: flex; flex-direction: column; }
.modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 4px; flex-shrink: 0; }
.modal-note { font-size: 12px; color: #999; margin-bottom: 16px; flex-shrink: 0; }
.tag-manage-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.tag-manage-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border: 1px solid #e8e7e0; border-radius: 8px; flex-shrink: 0; }
.tag-manage-name { flex: 1; font-size: 13px; font-weight: 500; }
.tag-manage-count { font-size: 12px; color: #aaa; }
.tag-manage-del { padding: 4px 12px; font-size: 12px; border: 1px solid #f0cfc8; border-radius: 6px; background: transparent; color: #c04040; cursor: pointer; white-space: nowrap; }
.tag-manage-del:hover { background: #fcefef; }
.modal-add { display: flex; gap: 8px; flex-shrink: 0; }
.modal-add input { flex: 1; padding: 8px 12px; border: 1px solid #d0cfc8; border-radius: 8px; font-size: 13px; outline: none; }
.modal-add input:focus { border-color: #378ADD; }
.modal-footer { margin-top: 14px; display: flex; justify-content: flex-end; flex-shrink: 0; }

.empty { text-align: center; padding: 48px 16px; color: #999; font-size: 14px; }
.status-bar { font-size: 12px; color: #888; padding: 8px 0; text-align: center; min-height: 28px; }
.status-bar.error { color: #c04040; }
.loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.7); align-items: center; justify-content: center; font-size: 14px; color: #555; z-index: 99; }
.loader.show { display: flex; }
</style>
</head>
<body>

<div class="loader" id="loader">Loading…</div>

<div class="modal-overlay" id="tag-modal" onclick="if(event.target===this)closeTagModal()">
  <div class="modal">
    <h3>Manage tags</h3>
    <p class="modal-note">Deleting a tag removes it from all meals.</p>
    <div class="tag-manage-list" id="tag-manage-list"></div>
    <div class="modal-add">
      <input type="text" id="new-global-tag" placeholder="New tag name…" />
      <button class="btn btn-primary" onclick="addGlobalTag()">Add</button>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeTagModal()">Done</button>
    </div>
  </div>
</div>

<header>
  <div>
    <h1>🍽 Meal Planner</h1>
    <div class="subtitle" id="meal-count">Loading…</div>
  </div>
  <div class="menu-wrap">
    <button class="btn" onclick="toggleMenu()">⚙️ Options ▾</button>
    <div class="dropdown hidden" id="dropdown">
      <div class="dropdown-section">View</div>
      <div class="dropdown-item" onclick="toggleCounts()">
        <span class="di-icon">🔢</span>
        <span class="di-label">Show use counts</span>
        <div class="di-toggle" id="counts-toggle"></div>
      </div>
      <div class="dropdown-section">Tags</div>
      <div class="dropdown-item" onclick="openTagModal()">
        <span class="di-icon">🏷️</span>
        <span class="di-label">Manage tags</span>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="add-card">
    <h2>Add a meal</h2>
    <div class="add-row">
      <input type="text" id="new-name" placeholder="Meal name…" autocomplete="off" />
      <button class="btn btn-primary" id="btn-add" onclick="addMeal()">Add</button>
    </div>
    <div class="tag-pills" id="add-tag-pills"></div>
  </div>

  <div class="controls" id="filter-bar"></div>
  <div class="meal-grid" id="meal-grid"></div>
  <div class="status-bar" id="status"></div>
</div>

<script>
const SUPABASE_URL = 'https://ylcthybtssnthhesbydt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlsY3RoeWJ0c3NudGhoZXNieWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTgzNjQsImV4cCI6MjA5NjQzNDM2NH0.PB1Geq9B7yjqFNNWnlkPOn3CFqHzwOBU9MdZMQsKibE';
const DEFAULT_TAGS = ['Summer','Fall','Winter','Spring'];
const H = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Prefer': 'return=representation'
};

let meals = [], allTags = [], currentFilter = 'all', showCounts = false, openEditorId = null, selectedAddTags = [];

async function api(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method, headers: H,
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

async function boot() {
  document.getElementById('loader').classList.add('show');
  try {
    let tagRows = await api('GET', 'tags?select=*');
    if (!tagRows || !tagRows.length) {
      const r = await api('POST', 'tags', { names: [...DEFAULT_TAGS] });
      tagRows = [r[0]];
    }
    allTags = tagRows[0].names || [];
    meals = await api('GET', 'meals?select=*&order=count.desc,name.asc');
    buildFilterBar();
    buildAddPills();
    renderList();
  } catch(e) { setStatus('Error loading: ' + e.message, true); }
  document.getElementById('loader').classList.remove('show');
}

function tagLabel(t) {
  const icons = { Summer:'☀️', Fall:'🍂', Winter:'❄️', Spring:'🌱' };
  return (icons[t] ? icons[t] + ' ' : '') + t;
}

function buildFilterBar() {
  document.getElementById('filter-bar').innerHTML =
    `<button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="setFilter('all',this)">All</button>` +
    allTags.map(t =>
      `<button class="filter-btn ${currentFilter===t?'active':''}" onclick="setFilter(${JSON.stringify(t)},this)">${tagLabel(t)}</button>`
    ).join('') +
    `<div class="search-wrap"><input type="text" id="search" placeholder="Search meals…" oninput="renderList()" /></div>`;
}

function buildAddPills() {
  document.getElementById('add-tag-pills').innerHTML = allTags.map(t => {
    const sel = selectedAddTags.includes(t);
    return `<span class="tag-pill ${sel?'selected':''}" onclick="toggleAddTag(${JSON.stringify(t)})">${tagLabel(t)}</span>`;
  }).join('');
}

function renderList() {
  const grid = document.getElementById('meal-grid');
  const searchEl = document.getElementById('search');
  const search = searchEl ? searchEl.value.toLowerCase().trim() : '';
  const filtered = meals.filter(m => {
    const ms = currentFilter === 'all' || (m.season||[]).includes(currentFilter);
    const ss = !search || m.name.toLowerCase().includes(search);
    return ms && ss;
  });
  document.getElementById('meal-count').textContent = meals.length + ' meals tracked';
  if (!filtered.length) { grid.innerHTML = '<div class="empty">No meals found.</div>'; return; }

  grid.innerHTML = filtered.map((m, i) => {
    const tags = m.season || [];
    const badges = tags.map(t => `<span class="badge">${tagLabel(t)}</span>`).join('');
    const isOpen = openEditorId === m.id;
    const countHtml = showCounts
      ? `<div class="count-area">
           <button class="count-btn" onclick="adjustCount('${m.id}',-1)">−</button>
           <span class="count-num">${m.count}</span>
           <button class="count-btn" onclick="adjustCount('${m.id}',1)">+</button>
         </div>`
      : '';
    return `<div class="meal-row" id="row-${m.id}">
      <div class="meal-main">
        <span class="rank">${i+1}</span>
        <div class="meal-info">
          <div class="meal-name">${escH(m.name)}</div>
          ${tags.length ? `<div class="meal-tags">${badges}</div>` : ''}
        </div>
        <div class="meal-actions">
          ${countHtml}
          <button class="btn-edit ${isOpen?'active':''}" onclick="toggleEditor('${m.id}')">✏️ Tags</button>
          <button class="btn-del" onclick="deleteMeal('${m.id}')">✕</button>
        </div>
      </div>
      <div class="meal-editor ${isOpen?'open':''}" id="editor-${m.id}">${renderEditor(m)}</div>
    </div>`;
  }).join('');
}

function renderEditor(m) {
  const cur = m.season || [];
  const tagsHtml = allTags.map(t =>
    `<span class="editor-tag ${cur.includes(t)?'on':''}" onclick="toggleMealTag('${m.id}',${JSON.stringify(t)})">${tagLabel(t)}</span>`
  ).join('');
  return `<div class="editor-label">Tags — click to toggle</div>
    <div class="editor-tags">${tagsHtml}</div>
    <div class="editor-add-row">
      <input type="text" id="newtag-${m.id}" placeholder="Create &amp; add a new tag…" onkeydown="if(event.key==='Enter')quickAddTag('${m.id}')" />
      <button onclick="quickAddTag('${m.id}')">+ Add</button>
    </div>`;
}

function toggleEditor(id) {
  openEditorId = openEditorId === id ? null : id;
  renderList();
}

async function toggleMealTag(id, tag) {
  const meal = meals.find(m => m.id === id); if (!meal) return;
  const cur = meal.season || [];
  const next = cur.includes(tag) ? cur.filter(t => t !== tag) : [...cur, tag];
  try {
    await api('PATCH', `meals?id=eq.${id}`, { season: next });
    meal.season = next;
    const ed = document.getElementById('editor-' + id);
    if (ed) ed.innerHTML = renderEditor(meal);
    const tagsEl = document.querySelector(`#row-${id} .meal-tags`);
    const newBadges = next.map(t => `<span class="badge">${tagLabel(t)}</span>`).join('');
    if (tagsEl) { tagsEl.innerHTML = newBadges; if (!next.length) tagsEl.remove(); }
    else if (next.length) {
      document.querySelector(`#row-${id} .meal-name`).insertAdjacentHTML('afterend', `<div class="meal-tags">${newBadges}</div>`);
    }
  } catch(e) { setStatus('Error: ' + e.message, true); }
}

async function quickAddTag(mealId) {
  const input = document.getElementById('newtag-' + mealId);
  const tag = (input.value || '').trim(); if (!tag) return;
  if (!allTags.includes(tag)) {
    allTags.push(tag);
    await saveTags();
    buildFilterBar();
    buildAddPills();
  }
  await toggleMealTag(mealId, tag);
  input.value = '';
}

function toggleAddTag(tag) {
  selectedAddTags = selectedAddTags.includes(tag)
    ? selectedAddTags.filter(t => t !== tag)
    : [...selectedAddTags, tag];
  buildAddPills();
}

async function addMeal() {
  const nameEl = document.getElementById('new-name');
  const name = nameEl.value.trim(); if (!name) { nameEl.focus(); return; }
  const btn = document.getElementById('btn-add'); btn.disabled = true; btn.textContent = 'Adding…';
  try {
    if (meals.find(m => m.name.toLowerCase() === name.toLowerCase())) {
      setStatus(`"${name}" already exists.`); btn.disabled = false; btn.textContent = 'Add'; return;
    }
    const result = await api('POST', 'meals', { name, season: [...selectedAddTags], count: 1 });
    meals.unshift(result[0]);
    meals.sort((a,b) => b.count - a.count || a.name.localeCompare(b.name));
    nameEl.value = ''; selectedAddTags = []; buildAddPills(); renderList();
    setStatus(`"${name}" added!`);
  } catch(e) { setStatus('Error: ' + e.message, true); }
  btn.disabled = false; btn.textContent = 'Add';
}

async function adjustCount(id, delta) {
  const meal = meals.find(m => m.id === id); if (!meal) return;
  const newCount = Math.max(0, meal.count + delta);
  try {
    await api('PATCH', `meals?id=eq.${id}`, { count: newCount });
    meal.count = newCount;
    meals.sort((a,b) => b.count - a.count || a.name.localeCompare(b.name));
    renderList();
  } catch(e) { setStatus('Error: ' + e.message, true); }
}

async function deleteMeal(id) {
  const meal = meals.find(m => m.id === id);
  if (!confirm(`Delete "${meal.name}"?`)) return;
  try {
    await api('DELETE', `meals?id=eq.${id}`);
    meals = meals.filter(m => m.id !== id);
    renderList();
  } catch(e) { setStatus('Error: ' + e.message, true); }
}

// ── Options menu ──────────────────────────────────────────────────────────────
function toggleMenu() { document.getElementById('dropdown').classList.toggle('hidden'); }
document.addEventListener('click', e => {
  if (!e.target.closest('.menu-wrap')) document.getElementById('dropdown').classList.add('hidden');
});

function toggleCounts() {
  showCounts = !showCounts;
  document.getElementById('counts-toggle').classList.toggle('on', showCounts);
  renderList();
}

// ── Tag management modal ──────────────────────────────────────────────────────
function openTagModal() {
  document.getElementById('dropdown').classList.add('hidden');
  renderTagModal();
  document.getElementById('tag-modal').classList.add('show');
}
function closeTagModal() { document.getElementById('tag-modal').classList.remove('show'); }

function tagMealCount(tag) {
  return meals.filter(m => (m.season || []).includes(tag)).length;
}

function renderTagModal() {
  const list = document.getElementById('tag-manage-list');
  if (!allTags.length) {
    list.innerHTML = '<div style="font-size:13px;color:#aaa;padding:4px 0;">No tags yet.</div>';
    return;
  }
  list.innerHTML = allTags.map(t => {
    const count = tagMealCount(t);
    const countLabel = count === 1 ? '1 meal' : `${count} meals`;
    return `<div class="tag-manage-row">
      <span class="tag-manage-name">${escH(tagLabel(t))}</span>
      <span class="tag-manage-count">${countLabel}</span>
      <button class="tag-manage-del" onclick="confirmDeleteTag(${JSON.stringify(t)})">Delete</button>
    </div>`;
  }).join('');
}

function confirmDeleteTag(tag) {
  const count = tagMealCount(tag);
  const mealWord = count === 1 ? 'meal' : 'meals';
  const msg = count > 0
    ? `Delete the tag "${tag}"?\n\nThis tag is used by ${count} ${mealWord}. It will be removed from all of them.`
    : `Delete the tag "${tag}"?\n\nThis tag isn't used by any meals.`;
  if (!confirm(msg)) return;
  deleteGlobalTag(tag);
}

async function deleteGlobalTag(tag) {
  allTags = allTags.filter(t => t !== tag);
  for (const meal of meals) {
    if ((meal.season || []).includes(tag)) {
      meal.season = meal.season.filter(t => t !== tag);
      await api('PATCH', `meals?id=eq.${meal.id}`, { season: meal.season });
    }
  }
  if (currentFilter === tag) currentFilter = 'all';
  await saveTags();
  buildFilterBar();
  buildAddPills();
  renderTagModal();
  renderList();
}

async function addGlobalTag() {
  const input = document.getElementById('new-global-tag');
  const tag = (input.value || '').trim();
  if (!tag || allTags.includes(tag)) { input.focus(); return; }
  allTags.push(tag);
  await saveTags();
  input.value = '';
  buildFilterBar();
  buildAddPills();
  renderTagModal();
}

async function saveTags() {
  const rows = await api('GET', 'tags?select=id');
  if (rows && rows.length) await api('PATCH', `tags?id=eq.${rows[0].id}`, { names: allTags });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-bar' + (isError ? ' error' : '');
  if (!isError) setTimeout(() => el.textContent = '', 3000);
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('new-name').addEventListener('keydown', e => { if (e.key === 'Enter') addMeal(); });
document.getElementById('new-global-tag').addEventListener('keydown', e => { if (e.key === 'Enter') addGlobalTag(); });

boot();
